name: jidoapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Core & UI
  cupertino_icons: ^1.0.8
  home_widget: ^0.7.0
  video_player: ^2.8.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  fluttertoast: ^8.2.5
  google_fonts: ^6.2.1
  blur: ^3.1.0
  flutter_colorpicker: ^1.1.0
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.2
  smooth_page_indicator: ^1.1.0
  sleek_circular_slider: ^2.0.1
  sticky_headers: ^0.3.0+2
  table_calendar: ^3.1.2
  flutter_svg: ^2.0.10+1

  # Firebase packages
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_analytics: ^11.3.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.2
  cached_network_image: ^3.4.1
  flutter_map_marker_cluster: ^1.3.6

  # Map & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  google_maps_flutter: ^2.14.0
  geojson_vi: ^2.2.5
  turf: ^0.0.8
  timezone: ^0.9.2
  lat_lng_to_timezone: ^0.2.0

  # Data & Network
  http: ^1.2.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.0.0
  equatable: ^2.0.5
  path_provider: ^2.1.3
  share_plus: ^10.0.0
  screenshot: ^3.0.0

  # Media & AI
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  google_generative_ai: ^0.4.7
  gal: ^2.3.2

  # WebView & Editor
  flutter_inappwebview: ^6.1.5
  flutter_quill: ^11.0.0
  flutter_quill_extensions: ^11.0.0
  country_flags: ^4.1.0
  geolocator: ^14.0.2
  google_sign_in: ^6.1.0
  image: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pie_chart: ^5.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# 앱 아이콘 설정
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo_large.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_logo_large.png"

# 스플래시 화면 설정 - 전체 화면 배경
flutter_native_splash:
  color: "#FFFFFF"
  background_image: assets/splash_image.png
  fullscreen: true

  android_12:
    image: assets/splash_image.png
    icon_background_color: "#FFFFFF"

